<!DOCTYPE html>
<html>
<head>
    <title>SimEra IPTV Player</title>
    <link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="app">
<div id="loader" class="loader">Loading...</div>
    <!-- TOP BAR -->
    <div class="topbar">

        <div class="logo">
            INTERNET TV
        </div>

        <input
            id="searchInput"
            placeholder="Search channels...">

        <div id="categoryBar" class="categories"></div>
        <button onclick="showFavorites()">
    ⭐Favorites
</button>

    </div>

    <!-- MAIN AREA -->
    <div class="main">

        <!-- LEFT CHANNEL LIST -->
        <div class="sidebar">
            <div id="channelList"></div>
        </div>

        <!-- VIDEO PLAYER -->
        <div class="player">
            <video id="videoPlayer" controls autoplay></video>
        </div>

    </div>

</div>



<div id="drawer" class="drawer">

    <h2>Playlist Settings</h2>

    <div class="drawer-section">

        <label>Upload Playlist</label>

        <input
            type="file"
            id="playlistFile"
            accept=".m3u,.m3u8">

    </div>

    <div class="drawer-section">

        <label>Playlist URL</label>

        <input
            type="text"
            id="playlistUrl"
            placeholder="https://example.com/list">

        <button id="loadUrlBtn">
            Load URL
        </button>

    </div>

    <div class="drawer-section">

        <button id="resetBtn">
            Reset Playlist
        </button>

    </div>

</div>

<div id="overlay" class="overlay"></div>

    <button id="menuBtn" class="menu-btn">☰
</button>


<script src="js/parser.js"></script>
<script src="js/player.js"></script>
<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</body>
</html>
